matrix:
  homeserver_url: "https://matrix.example.com"
  user_id: "@viber:example.com"
  access_token: "syt_dmliZXI_XXXXXXXXXXXXX_XXXXXX"   # from register-viber-user.sh
  device_id: "XXXXXXXXXX"
  control_room_id: "!CHANGE_ME:example.com"          # the private room you invited @viber into
  admin_user_id: "@admin:example.com"          # only this user can run commands
  room_name_prefix: "Viber · "                       # new rooms auto-named "Viber · <contact>"

viber:
  # Title substring used as a *secondary* match signal. The bridge primarily
  # identifies Viber by its Qt class name (MainWindow_QMLTYPE_*), so this is
  # usually not critical. Current Viber Desktop titles its window
  # "Rakuten Viber" — older/localized builds just say "Viber".
  window_title: "Rakuten Viber"
  poll_interval_seconds: 3                           # how often to scan for new messages
  backend: "uiautomation"                            # uiautomation | pywinauto (uiautomation recommended)
  typing_delay_ms: 20                                # per-char delay when pasting replies
  click_pause_ms: 150                                # pause between UI actions

bridge:
  state_db: "C:\\viber-bridge\\state.db"
  log_file: "C:\\viber-bridge\\bridge.log"
  log_level: "INFO"                                  # DEBUG | INFO | WARNING | ERROR
  echo_suppression_window_seconds: 30                # dedup window for our own messages
  startup_message: "Viber bridge online"             # posted to control room on start
  max_backfill_per_chat: 5                           # messages to read on first sight of a chat
  room_per_chat: true                                # true = one Matrix room per Viber chat
  # Poll loop is OFF by default. When enabled, the bridge navigates to every
  # mapped Viber chat on every interval to check for new messages — this
  # steals focus from Viber. Leave off for interactive use; turn on when
  # you're willing to let the bridge drive Viber.
  poll_enabled: false
  poll_interval_seconds: 60                          # minimum 30s

# Optional: LLM fallback for unexpected UI states (off by default)
llm_fallback:
  enabled: false
  # When enabled, will call a vision-capable model if the Viber UI tree is
  # unparseable. Not recommended unless you've already tuned selectors.
